name: diffoscope
true:
- push
- pull_request
jobs:
  repro-diff:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install diffoscope
      run: sudo apt-get update && sudo apt-get install -y diffoscope
    - name: Build normalized tarballs
      run: 'bash scripts/release/tarball_normalize.sh out1.tar.gz

        sleep 1

        bash scripts/release/tarball_normalize.sh out2.tar.gz

        '
    - name: Compare with diffoscope (HTML)
      run: diffoscope --html report.html out1.tar.gz out2.tar.gz || true
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: diffoscope-report
        path: report.html
'on':
- workflow_dispatch
