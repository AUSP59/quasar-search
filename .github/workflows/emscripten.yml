name: emscripten-wasm
true:
- push
- pull_request
jobs:
  wasm:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: mymindstorm/setup-emsdk@v14
    - name: Configure (emcmake)
      run: emcmake cmake -S . -B build-wasm -D CMAKE_BUILD_TYPE=Release || true
    - name: Build
      run: cmake --build build-wasm -j || true
    - name: Archive wasm artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wasm-artifacts
        path: 'build-wasm/**/*.wasm

          build-wasm/**/*.js

          build-wasm/**/*.html

          '
        if-no-files-found: ignore
'on':
- workflow_dispatch
