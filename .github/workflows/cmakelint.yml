name: cmakelint
true:
- push
- pull_request
jobs:
  lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: BSFishy/pip-action@v1
      with:
        packages: cmakelint
    - name: Run cmakelint
      run: cmakelint $(git ls-files | grep -E '(CMakeLists\.txt|\.cmake$)') || true
'on':
- workflow_dispatch
