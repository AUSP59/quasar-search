name: windows-msvc
true:
- push
- pull_request
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    continue-on-error: true
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.4
    - name: Configure (Release)
      shell: pwsh
      run: cmake -S . -B build -D CMAKE_BUILD_TYPE=Release -D CMAKE_C_COMPILER_LAUNCHER=sccache
        -D CMAKE_CXX_COMPILER_LAUNCHER=sccache
    - name: Build
      shell: pwsh
      run: cmake --build build -j
    - name: Collect artifacts
      shell: pwsh
      run: 'New-Item -ItemType Directory -Force -Path out | Out-Null

        Copy-Item -Recurse build\* out\

        Compress-Archive -Path out\* -DestinationPath quasar-apex-windows-msvc.zip
        -Force

        '
    - uses: actions/upload-artifact@v4
      with:
        name: quasar-apex-windows-msvc
        path: quasar-apex-windows-msvc.zip
'on':
- workflow_dispatch
