name: yamllint
true:
- push
- pull_request
jobs:
  lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install yamllint
      run: sudo apt-get update && sudo apt-get install -y yamllint
    - name: Run yamllint
      run: yamllint -c .yamllint.yml .
'on':
- workflow_dispatch
