name: semantic-pull-requests
true:
  pull_request_target:
    types:
    - opened
    - edited
    - reopened
    - synchronize
permissions:
  pull-requests: write
jobs:
  check:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
'on':
- workflow_dispatch
