name: scan-build
true:
- push
- pull_request
jobs:
  analyze:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install clang tools
      run: sudo apt-get update && sudo apt-get install -y clang-tools
    - name: Run scan-build
      run: 'scan-build -o scanreport cmake -S . -B build -D CMAKE_BUILD_TYPE=Release

        scan-build -o scanreport cmake --build build -j || true

        '
    - uses: actions/upload-artifact@v4
      with:
        name: scan-build-report
        path: scanreport
'on':
- workflow_dispatch
