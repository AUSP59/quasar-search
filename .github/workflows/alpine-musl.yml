name: alpine-musl
true:
- push
- pull_request
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    continue-on-error: true
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    steps:
    - name: Install deps
      run: 'apk add --no-cache git cmake make ninja g++ musl-dev bash

        '
    - uses: actions/checkout@v4
    - name: Configure (static best-effort)
      run: cmake -S . -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D QUASAR_STATIC_LINK=ON
        -D QUASAR_ENABLE_TESTS=ON
    - name: Build
      run: cmake --build build -j
    - name: Test
      run: ctest --test-dir build --output-on-failure || true
'on':
- workflow_dispatch
