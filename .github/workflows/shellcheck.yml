name: shellcheck
true:
- push
- pull_request
jobs:
  shfmt:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck
    - name: Run shellcheck
      run: 'find . -type f -name ''*.sh'' -print0 | xargs -0 -I {} bash -lc ''shellcheck
        {} || true''

        '
'on':
- workflow_dispatch
