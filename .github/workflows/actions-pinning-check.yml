name: actions-pinning-check
true:
- push
- pull_request
jobs:
  check:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Search for unpinned actions
      run: "set -e\nfiles=$(git ls-files '.github/workflows/*.yml')\necho \"Checking\
        \ $files\"\nbad=0\nfor f in $files; do\n  if grep -E \"uses: .+@v[0-9]\" -n\
        \ \"$f\"; then\n    echo \"::warning file=$f::Action version uses a tag (@vX).\
        \ Consider pinning to a commit SHA.\"\n    bad=$((bad+1))\n  fi\ndone\necho\
        \ \"Found $bad unpinned action uses (advisory).\"\n"
'on':
- workflow_dispatch
