name: container-buildx
true:
  push:
    branches:
    - main
  release:
    types:
    - published
jobs:
  buildx:
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - uses: step-security/harden-runner@v2
      with:
        egress-policy: audit
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      if: ${{ github.event_name == 'release' && vars.PUBLISH_IMAGES == 'true' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build (multi-arch)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: container/Dockerfile.release
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name == 'release' && vars.PUBLISH_IMAGES == 'true'
          }}
        tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        labels: 'org.opencontainers.image.title=Quasar Apex

          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository
          }}

          org.opencontainers.image.version=${{ github.ref_name }}

          org.opencontainers.image.revision=${{ github.sha }}

          org.opencontainers.image.licenses=Apache-2.0

          '
'on':
- workflow_dispatch
