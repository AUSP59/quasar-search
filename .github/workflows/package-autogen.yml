name: package-autogen
true:
  workflow_dispatch: null
  release:
    types:
    - published
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  autogen:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Generate packaging manifests
      run: 'mkdir -p packaging/out

        echo "name: quasar-search" > packaging/out/example.yaml

        echo "version: ${{ github.event.release.tag_name || ''0.0.0'' }}" >> packaging/out/example.yaml

        '
    - name: Upload generated packaging artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packaging-autogenerated-${{ github.event.release.tag_name || '0.0.0'
          }}
        path: packaging/out
    - name: Create PR with generated manifests
      if: github.event_name == 'release'
      uses: peter-evans/create-pull-request@v6
      with:
        branch: autogen/${{ github.event.release.tag_name }}
        title: 'chore(packaging): auto-generate manifests for ${{ github.event.release.tag_name
          }}'
        commit-message: 'chore(packaging): auto-generate manifests'
        add-paths: 'packaging/out/**

          '
'on':
- workflow_dispatch
