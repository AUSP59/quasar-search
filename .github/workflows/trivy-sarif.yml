name: trivy-sarif
true:
- push
- pull_request
permissions:
  security-events: write
jobs:
  trivy-sarif:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy.sarif
    - uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy.sarif
'on':
- workflow_dispatch
