name: iwyu
true:
- push
- pull_request
jobs:
  iwyu:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install IWYU
      run: sudo apt-get update && sudo apt-get install -y include-what-you-use
    - name: Configure
      run: cmake -S . -B build -D CMAKE_BUILD_TYPE=Release -D CMAKE_EXPORT_COMPILE_COMMANDS=ON
    - name: Run IWYU (report-only)
      run: iwyu_tool -p build $(git ls-files '*.cpp' '*.cc' '*.cxx') || true
'on':
- workflow_dispatch
