name: release-sign
true:
  release:
    types:
    - published
jobs:
  sign:
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: sigstore/cosign-installer@v3
    - name: Sign release artifacts (keyless OIDC)
      run: 'echo "This is a template step. Configure to sign your tarballs with cosign
        keyless."

        # Example:

        # cosign sign-blob --yes --oidc-issuer=https://token.actions.githubusercontent.com           #   --output-signature
        quasar-${{ github.ref_name }}.sig dist/*.tar.gz

        '
'on':
- workflow_dispatch
