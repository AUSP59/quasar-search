name: cppcheck
true:
- push
- pull_request
jobs:
  static-analysis:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install cppcheck
      run: sudo apt-get update && sudo apt-get install -y cppcheck
    - name: Run cppcheck
      run: cppcheck --std=c++20 --enable=warning,style,performance,portability --error-exitcode=1
        --inline-suppr -I include $(git ls-files '*.cpp' '*.cc' '*.cxx') || true
'on':
- workflow_dispatch
