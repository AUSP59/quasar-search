name: json-schema
true:
- push
- pull_request
jobs:
  validate:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install deps
      run: sudo apt-get update && sudo apt-get install -y python3-pip
    - name: Install jsonschema
      run: pip install jsonschema
    - name: Build
      run: cmake -S . -B build -D CMAKE_BUILD_TYPE=Release && cmake --build build
        -j
    - name: Validate CLI JSON output
      run: bash tests/json/validate_json.sh build/apps/quasar-grep
'on':
- workflow_dispatch
