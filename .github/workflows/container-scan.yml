name: container-scan
true:
- push
- pull_request
jobs:
  trivy-image:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build image
      run: docker build -f container/Dockerfile.rootless -t quasar-apex:scan .
    - uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: quasar-apex:scan
        format: table
        vuln-type: os,library
        exit-code: '0'
'on':
- workflow_dispatch
