name: link-check
true:
- push
- pull_request
jobs:
  lychee:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Link check
      uses: lycheeverse/lychee-action@v1
      with:
        args: --verbose --no-progress --max-concurrency 4 --exclude-mail --accept
          200,429 -- *.md docs/**/*.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
'on':
- workflow_dispatch
